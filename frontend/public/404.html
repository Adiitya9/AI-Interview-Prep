<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Page Not Found</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
      body {
        margin: 0;
        padding: 0;
        background: linear-gradient(135deg, #0F0A1A 0%, #1a0f2e 100%);
        font-family: 'Inter', sans-serif;
      }
    </style>
    <script>
      var pathname = window.location.pathname;
      var repo = '/AI-Interview-Prep/';
      
      if (pathname.indexOf(repo) === 0) {
        var path = pathname.slice(repo.length);
        if (path && path !== '404.html' && !path.match(/\.[a-z]+$/i)) {
          sessionStorage.redirect = path;
          window.location.href = repo + 'index.html';
        }
      }
    </script>
  </head>
  <body>
    <!-- This page will redirect to React app or display 404 -->
    <div id="root"></div>
    <script type="module" src="/AI-Interview-Prep/src/main.jsx"></script>
  </body>
</html>
